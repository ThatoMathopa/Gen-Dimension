<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Gen Dimension</title>
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1e1e1c;
      --accent:  #c9a84c;
      --light:   #f6f5f0;
      --muted:   #7a7a72;
      --white:   #ffffff;
      --border:  rgba(0,0,0,0.09);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--light);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .reset-box {
      background: var(--white);
      max-width: 460px;
      width: 100%;
      padding: 3rem 2.5rem;
      border: 0.5px solid rgba(0,0,0,0.08);
    }
    .reset-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      text-align: center;
    }
    .reset-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 0.4rem;
    }
    .reset-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      background: var(--white);
      color: var(--primary);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .reset-btn {
      width: 100%;
      background: var(--primary);
      color: var(--accent);
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .reset-btn:hover:not(:disabled) { background: #333; }
    .reset-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-msg {
      font-size: 12px;
      min-height: 18px;
      padding: 0.5rem 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
    .auth-msg.error   { display: block; background: #FCEBEB; color: #791F1F; }
    .auth-msg.success { display: block; background: #EAF3DE; color: #27500A; }
    .reset-back {
      display: block;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 1.5rem;
      text-decoration: none;
    }
    .reset-back:hover { color: var(--primary); }
    #successView { display: none; text-align: center; }
    .success-icon {
      width: 64px; height: 64px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }
    @media (max-width: 480px) {
      .reset-box { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="reset-box">
    <div class="reset-logo">Gen Dimension</div>

    <!-- Reset Form -->
    <div id="formView">
      <div class="reset-title">Set new password</div>
      <p class="reset-sub">Choose a strong password with at least 8 characters.</p>

      <div class="form-group">
        <label class="form-label" for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters"
               onkeydown="if(event.key==='Enter')submitReset()" />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password"
               onkeydown="if(event.key==='Enter')submitReset()" />
      </div>

      <div class="auth-msg" id="resetMsg"></div>
      <button class="reset-btn" id="resetBtn" onclick="submitReset()">Update Password</button>
      <a class="reset-back" href="index.html">← Back to store</a>
    </div>

    <!-- Success View -->
    <div id="successView">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="reset-title">Password updated!</div>
      <p class="reset-sub" style="margin-bottom:1.5rem;">Your password has been changed. Redirecting you to the store…</p>
      <a class="reset-btn" href="index.html" style="display:inline-block;text-align:center;text-decoration:none;">Go to Store</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const TOKEN  = params.get('token') || '';

    if (!TOKEN) {
      const msg = document.getElementById('resetMsg');
      msg.textContent = 'Invalid or missing reset token. Please request a new link.';
      msg.className   = 'auth-msg error';
      document.getElementById('resetBtn').disabled = true;
    }

    async function submitReset() {
      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const msg      = document.getElementById('resetMsg');
      const btn      = document.getElementById('resetBtn');

      msg.className = 'auth-msg';
      msg.textContent = '';

      if (!password) {
        msg.textContent = 'Please enter a new password.';
        msg.className   = 'auth-msg error';
        return;
      }
      if (password.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        msg.className   = 'auth-msg error';
        return;
      }
      if (password !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.className   = 'auth-msg error';
        return;
      }

      btn.textContent = 'Updating…';
      btn.disabled    = true;

      try {
        const res  = await fetch('backend/auth.php?action=reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token: TOKEN, password }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('formView').style.display    = 'none';
          document.getElementById('successView').style.display = 'block';
          setTimeout(() => { location.href = 'index.html'; }, 3000);
        } else {
          msg.textContent = data.error || 'Reset failed. Please try again.';
          msg.className   = 'auth-msg error';
          btn.textContent = 'Update Password';
          btn.disabled    = false;
        }
      } catch (e) {
        msg.textContent = 'Connection error. Please try again.';
        msg.className   = 'auth-msg error';
        btn.textContent = 'Update Password';
        btn.disabled    = false;
      }
    }
  </script>
</body>
</html>
