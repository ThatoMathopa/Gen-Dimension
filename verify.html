<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — Gen Dimension</title>
  <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1e1e1c;
      --accent:  #c9a84c;
      --light:   #f6f5f0;
      --muted:   #7a7a72;
      --white:   #ffffff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--light);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .verify-box {
      background: var(--white);
      max-width: 460px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
      border: 0.5px solid rgba(0,0,0,0.08);
    }
    .verify-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }
    .verify-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .verify-icon.loading { background: #f0efe9; }
    .verify-icon.success { background: #dcfce7; }
    .verify-icon.error   { background: #fee2e2; }
    .verify-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }
    .verify-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .verify-btn {
      display: inline-block;
      background: var(--primary);
      color: var(--accent);
      padding: 14px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .verify-btn:hover { background: #333; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="verify-box">
    <div class="verify-logo">Gen Dimension</div>

    <div class="verify-icon loading" id="verifyIcon">
      <div class="spinner" id="spinner"></div>
    </div>

    <div class="verify-title" id="verifyTitle">Verifying your email…</div>
    <p class="verify-sub" id="verifySub">Please wait a moment.</p>

    <div id="verifyAction" style="display:none">
      <a href="index.html" class="verify-btn">Go to Store</a>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const token  = params.get('token') || '';
      const icon   = document.getElementById('verifyIcon');
      const title  = document.getElementById('verifyTitle');
      const sub    = document.getElementById('verifySub');
      const action = document.getElementById('verifyAction');
      const spinner = document.getElementById('spinner');

      if (!token) {
        icon.className  = 'verify-icon error';
        spinner.remove();
        icon.innerHTML  = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
        title.textContent = 'Invalid link';
        sub.textContent   = 'This verification link is invalid or has expired.';
        action.style.display = '';
        return;
      }

      try {
        const res  = await fetch('backend/auth.php?action=verify&token=' + encodeURIComponent(token));
        const data = await res.json();

        spinner.remove();

        if (data.success) {
          icon.className    = 'verify-icon success';
          icon.innerHTML    = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          title.textContent = 'Email verified!';
          sub.textContent   = data.message || 'Your account is ready. You can now sign in.';
        } else {
          icon.className    = 'verify-icon error';
          icon.innerHTML    = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
          title.textContent = 'Verification failed';
          sub.textContent   = data.error || 'This link is invalid or has already been used.';
        }
      } catch (e) {
        spinner.remove();
        icon.className    = 'verify-icon error';
        icon.innerHTML    = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
        title.textContent = 'Connection error';
        sub.textContent   = 'Could not reach the server. Please try again.';
      }

      action.style.display = '';
    })();
  </script>
</body>
</html>
